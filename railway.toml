# ──────────────────────────────────────────────────────────────
# Whale Marketplace — Railway Deployment Configuration
# ──────────────────────────────────────────────────────────────

[build]
builder = "dockerfile"

[deploy]
preDeployCommand = "npx prisma migrate deploy --skip-generate"
startCommand = "node entrypoint.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
