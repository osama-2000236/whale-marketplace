# ──────────────────────────────────────────────────────────────
# Whale Marketplace — Railway Deployment Configuration
# ──────────────────────────────────────────────────────────────

[build]
builder = "dockerfile"

[deploy]
startCommand = "node entrypoint.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
