# ──────────────────────────────────────────────────────────────
# Whale Marketplace — Railway Deployment Configuration
# Purpose: Tells Railway how to build and run the application
# Author: Whale Development Team
# Created: 2026-03-18
# ──────────────────────────────────────────────────────────────

[build]
builder = "nixpacks"
buildCommand = "npm ci && npx prisma generate"

[deploy]
startCommand = "npx prisma migrate deploy && node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
