# ──────────────────────────────────────────────────────────────
# Whale Marketplace — CI Pipeline
# Purpose: Run tests on every push to develop, merge to main if green
# Author: Whale Development Team
# Created: 2026-03-18
# Triggers: push to develop, pull requests to main
# ──────────────────────────────────────────────────────────────

name: Whale CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/whale_test?schema=public
  SESSION_SECRET: ci-test-secret-not-for-production-64chars-aaaaaaaaaaaaaaaaaaaaaa

jobs:
  # ── Step 1: Lint, audit, and check for secrets ──
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for security vulnerabilities
        run: npm audit --audit-level=high

      - name: Run ESLint
        run: npm run lint

  # ── Step 2: Unit and integration tests with Jest ──
  test:
    name: Jest Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: whale_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run Jest tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ── Step 3: UI tests with Playwright ──
  test-ui:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: whale_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npm run seed
        env:
          ADMIN_USERNAME: admin
          ADMIN_EMAIL: admin@test.local
          ADMIN_PASSWORD: TestAdmin@2026

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (chromium project)
        run: npx playwright test --project=chromium
        env:
          PORT: 3000
          SITE_URL: http://localhost:3000
          OAUTH_CALLBACK_BASE: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/reports/html/

  # ── Step 4: Auto-merge to main if all tests pass ──
  merge-to-main:
    name: Merge to Main
    runs-on: ubuntu-latest
    needs: [test, test-ui]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Whale CI"
          git config user.email "ci@whale.ps"

      - name: Merge develop into main
        run: |
          git checkout main
          git merge develop --no-ff -m "ci: auto-merge develop → main (all tests passed)"
          git push origin main
